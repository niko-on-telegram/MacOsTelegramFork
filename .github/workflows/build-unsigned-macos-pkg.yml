name: Build Unsigned macOS Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
      - "release-*"

concurrency:
  group: unsigned-macos-pkg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-unsigned-pkg:
    name: Build unsigned Release arm64 package
    runs-on: macos-26
    timeout-minutes: 180

    permissions:
      contents: read

    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      TELEGRAM_MACOS_ARCHS: "arm64"
      FRAMEWORKS_CACHE_VERSION: "v1"

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          submodules: false

      - name: Rewrite submodule URLs to HTTPS
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://gitlab.com/".insteadOf git@gitlab.com:
          git submodule sync --recursive
          git submodule update --init --recursive --jobs 4

      - name: Apply local submodule patches
        run: ./ci/macos/apply_submodule_patches.sh

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Compute frameworks cache key
        id: frameworks_cache_key
        shell: bash
        run: |
          set -euo pipefail

          cache_inputs="$(mktemp)"

          {
            printf 'frameworks-cache-version=%s\n' "$FRAMEWORKS_CACHE_VERSION"
            printf 'target-archs=%s\n' "$TELEGRAM_MACOS_ARCHS"
            xcodebuild -version
            git submodule status --recursive

            git ls-files \
              .gitmodules \
              scripts/configure_frameworks.sh \
              ci/macos/apply_submodule_patches.sh \
              ci/patches \
              core-xprojects \
            | LC_ALL=C sort \
            | while IFS= read -r path; do
                shasum -a 256 "$path"
              done
          } > "$cache_inputs"

          cache_key="$(shasum -a 256 "$cache_inputs" | awk '{print $1}')"
          printf 'key=%s\n' "$cache_key" >> "$GITHUB_OUTPUT"

      - name: Restore configured frameworks cache
        id: frameworks_cache
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-xcode-frameworks-${{ steps.frameworks_cache_key.outputs.key }}
          path: |
            core-xprojects/OpenH264/build
            core-xprojects/openssl/build
            core-xprojects/libopus/build
            core-xprojects/libvpx/build
            core-xprojects/Mozjpeg/build
            core-xprojects/libwebp/build
            core-xprojects/dav1d/build
            core-xprojects/ffmpeg/build
            core-xprojects/webrtc/build
            core-xprojects/tde2e/build
            submodules/telegram-ios/submodules/TelegramCore/FlatSerialization/Sources
            submodules/telegram-ios/submodules/OpusBinding/SharedHeaders
            submodules/telegram-ios/submodules/FFMpegBinding/SharedHeaders
            submodules/telegram-ios/submodules/OpenSSLEncryptionProvider/SharedHeaders
            submodules/telegram-ios/third-party/td/TdBinding/SharedHeaders
            submodules/tgcalls/SharedHeaders
            submodules/libwebp/SharedHeaders
            submodules/Mozjpeg/SharedHeaders

      - name: Decide whether to rebuild frameworks
        id: configure_frameworks
        shell: bash
        run: |
          if [[ "${{ steps.frameworks_cache.outputs.cache-hit }}" == "true" ]]; then
            echo "run_configure=0" >> "$GITHUB_OUTPUT"
            echo "Using cached configure_frameworks outputs."
          else
            echo "run_configure=1" >> "$GITHUB_OUTPUT"
            echo "No frameworks cache hit; configure_frameworks will run."
          fi

      - name: Install Homebrew dependencies
        if: ${{ steps.configure_frameworks.outputs.run_configure == '1' }}
        run: |
          packages=(cmake ninja meson zlib autoconf libtool automake yasm nasm pkg-config)
          missing=()
          for pkg in "${packages[@]}"; do
            if ! brew list --versions "$pkg" >/dev/null 2>&1; then
              missing+=("$pkg")
            fi
          done

          if ((${#missing[@]})); then
            brew install "${missing[@]}"
          else
            echo "All requested Homebrew packages are already installed."
          fi

      - name: Build unsigned package
        id: build_pkg
        run: ./ci/macos/build_unsigned_pkg.sh
        env:
          DERIVED_DATA_PATH: ${{ github.workspace }}/.ci-build/DerivedData
          ARTIFACTS_DIR: ${{ github.workspace }}/.ci-artifacts
          STAGE_DIR: ${{ github.workspace }}/.ci-build/pkg-root
          APPLY_LOCAL_PATCHES: "0"
          RUN_CONFIGURE_FRAMEWORKS: ${{ steps.configure_frameworks.outputs.run_configure }}
          SKIP_BUILD: "0"
          TELEGRAM_MACOS_ARCHS: ${{ env.TELEGRAM_MACOS_ARCHS }}

      - name: Upload build logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: telegram-macos-unsigned-logs-${{ github.run_number }}-${{ github.run_attempt }}
          include-hidden-files: true
          path: |
            .ci-artifacts/*.txt
            .ci-artifacts/*.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload unsigned artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v6
        with:
          name: telegram-macos-unsigned-${{ steps.build_pkg.outputs.short_version }}-r${{ steps.build_pkg.outputs.bundle_version }}
          include-hidden-files: true
          path: |
            .ci-artifacts/*.pkg
            .ci-artifacts/*.zip
            .ci-artifacts/*.txt
          if-no-files-found: error
          retention-days: 14
